# Go workflow configuration

name: Go

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.x'

      - name: Cache Go modules
        uses: actions/cache@v2
        with:
          path: /go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}

      # Update the cache key to v3
      - name: Build
        run: go build ./...

      # Updated ./configure command with additional flags
      - name: Configure
        run: ./configure --enable-filter=buffersink --enable-filter=format