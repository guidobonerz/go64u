name: Go CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.16'
      - name: Install dependencies
        run: |
          go mod tidy
      - name: Build
        run: |
          go build ./...

      - name: Cache Go modules
        uses: actions/cache@v2
        with:
          path: /tmp/.go-build
          key: v3-${{ runner.os }}-go-${{ hashFiles('**/*.go') }}
          restore-keys: |
            v3-${{ runner.os }}-go-
            v2-${{ runner.os }}-go-

      - name: Run tests
        run: |
          go test ./...

      - name: Configure FFmpeg
        run: |
          ./configure \
            --enable-filter=buffersink \
            --enable-filter=format
          make
          make install
          make clean
