name: ffmpeg-prebuilt

# Builds the static FFmpeg + x264 prefixes for all four target platforms and
# attaches them as tarballs to a dedicated GitHub Release ('ffmpeg-prebuilt').
# build.yml downloads these tarballs at job start instead of rebuilding FFmpeg
# every time — that decouples the slow FFmpeg compile from every tag/release.
#
# IMPORTANT: FFMPEG_VERSION and X264_REF MUST stay identical to the values in
# .github/workflows/build.yml. When bumping a version:
#   1. Edit BOTH files
#   2. Manually trigger this workflow:
#        gh workflow run ffmpeg-prebuilt.yml --ref main
#   3. Wait for the 'ffmpeg-prebuilt' release to update
#   4. Then proceed with build.yml runs (tag-push or otherwise)
#
# Manual-only on purpose: rebuilding FFmpeg costs ~25 min per platform; we don't
# want it firing as a side effect of an unrelated commit on main.

on:
  workflow_dispatch:

concurrency:
  group: ffmpeg-prebuilt
  cancel-in-progress: true

env:
  # KEEP IN SYNC WITH .github/workflows/build.yml
  FFMPEG_VERSION: 'n8.0'
  X264_REF: 'b35605ace3ddf7c1a5d67a2eb553f034aef41d55'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-ffmpeg:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            runs-on: windows-latest
          - name: linux-amd64
            runs-on: ubuntu-latest
          - name: macos-arm64
            runs-on: macos-latest
            clang_arch: arm64
            ff_arch: aarch64
          - name: macos-amd64
            runs-on: macos-latest
            clang_arch: x86_64
            ff_arch: x86_64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      # ----- Windows: Defender-Ausschluss VOR jeder Kompilier-Aktivität -----
      - name: Defender exclusions (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "C:\msys64"
          Add-MpPreference -ExclusionProcess "gcc.exe"
          Add-MpPreference -ExclusionProcess "g++.exe"
          Add-MpPreference -ExclusionProcess "ld.exe"
          Add-MpPreference -ExclusionProcess "ar.exe"
          Add-MpPreference -ExclusionProcess "ranlib.exe"
          Add-MpPreference -ExclusionProcess "make.exe"
          Add-MpPreference -ExclusionProcess "mingw32-make.exe"
          Add-MpPreference -ExclusionProcess "nasm.exe"

      # ----- Per-OS host deps (FFmpeg-build only — no Go, no Gio system libs) -----

      - name: Install host deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc make pkg-config nasm yasm zstd

      - name: Install host deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config nasm zstd

      - name: Install host deps (Windows / MSYS2)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-make
            mingw-w64-x86_64-zstd
            make
            tar
            git
            patch
            diffutils

      # ----- Build x264 + FFmpeg statically (Linux/macOS) -----

      - name: Build static x264 + FFmpeg (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          MATRIX_CLANG_ARCH: ${{ matrix.clang_arch }}
          MATRIX_FF_ARCH: ${{ matrix.ff_arch }}
        run: |
          set -e
          PREFIX="$PWD/ffmpeg-static/prefix"
          mkdir -p "$PREFIX"

          CROSS_CFLAGS=""
          CROSS_LDFLAGS=""
          X264_HOST=""
          FFMPEG_CROSS=""
          if [ "$(uname)" = "Darwin" ]; then
            NATIVE_ARCH="$(uname -m)"
            CROSS_CFLAGS="-arch ${MATRIX_CLANG_ARCH}"
            CROSS_LDFLAGS="-arch ${MATRIX_CLANG_ARCH}"
            if [ "$MATRIX_CLANG_ARCH" != "$NATIVE_ARCH" ]; then
              X264_HOST="--host=${MATRIX_CLANG_ARCH}-apple-darwin"
              FFMPEG_CROSS="--enable-cross-compile"
            fi
          fi

          # ---- x264 ----
          git clone https://code.videolan.org/videolan/x264.git x264-src
          cd x264-src
          git checkout "$X264_REF"
          ./configure --prefix="$PREFIX" \
            --enable-static --disable-cli --disable-opencl \
            $X264_HOST \
            ${CROSS_CFLAGS:+--extra-cflags="$CROSS_CFLAGS"} \
            ${CROSS_LDFLAGS:+--extra-ldflags="$CROSS_LDFLAGS"}
          if [ "$(uname)" = "Darwin" ]; then JOBS=$(sysctl -n hw.ncpu); else JOBS=$(nproc); fi
          make -j"$JOBS"
          make install
          cd ..

          # ---- FFmpeg ----
          git clone --depth 1 --branch "$FFMPEG_VERSION" \
            https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src

          EXTRA_CONFIG=""
          ENCODERS="libx264,aac"
          ARCH_FLAGS=""
          if [ "$(uname)" = "Darwin" ]; then
            EXTRA_CONFIG="--enable-videotoolbox $FFMPEG_CROSS --arch=${MATRIX_FF_ARCH} --target-os=darwin"
            ENCODERS="libx264,h264_videotoolbox,aac"
            ARCH_FLAGS="-arch ${MATRIX_CLANG_ARCH}"
          fi

          # Disable X11/XCB autodetect: macos-latest has Homebrew libx11/xcb,
          # which FFmpeg would silently pull into libavdevice (xcbgrab.c) and
          # leak a /opt/homebrew/.../libX11.6.dylib reference into the binary.
          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" ./configure \
            --prefix="$PREFIX" \
            --enable-gpl --enable-libx264 $EXTRA_CONFIG \
            --enable-static --disable-shared \
            --disable-programs --disable-doc \
            --disable-xlib --disable-libxcb \
            --disable-libxcb-shm --disable-libxcb-xfixes --disable-libxcb-shape \
            --enable-protocol=file,pipe,tcp,rtmp \
            --enable-encoder=$ENCODERS \
            --enable-decoder=rawvideo,pcm_s16le \
            --enable-muxer=flv,mp4,matroska \
            --enable-demuxer=rawvideo \
            --enable-swscale --enable-swresample \
            --extra-cflags="-I$PREFIX/include $ARCH_FLAGS" \
            --extra-ldflags="-L$PREFIX/lib $ARCH_FLAGS"
          make -j"$JOBS"
          make install

      # ----- Build x264 + FFmpeg statically (Windows / MSYS2) -----

      - name: Build static x264 + FFmpeg (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -e
          export PATH="/mingw64/bin:$PATH"
          mkdir -p ffmpeg-static/prefix
          # Mixed-style path (D:/a/...) so both MSYS2 'install' and native
          # MinGW tools (gcc-ranlib etc.) can resolve it.
          PREFIX="$(cygpath -m "$(pwd)/ffmpeg-static/prefix")"

          # ---- x264 ----
          git clone https://code.videolan.org/videolan/x264.git x264-src
          cd x264-src
          git checkout "$X264_REF"
          ./configure --prefix="$PREFIX" \
            --enable-static --disable-cli --disable-opencl
          mingw32-make -j"$NUMBER_OF_PROCESSORS"
          mingw32-make install
          cd ..

          # ---- FFmpeg ----
          # Use MSYS2's plain `make` (bash-backed), not mingw32-make, because
          # FFmpeg's library.mak uses $(file >...) which mingw32-make breaks.
          git clone --depth 1 --branch "$FFMPEG_VERSION" \
            https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" ./configure \
            --prefix="$PREFIX" \
            --enable-gpl --enable-libx264 \
            --enable-static --disable-shared \
            --disable-programs --disable-doc \
            --enable-protocol=file,pipe,tcp,rtmp \
            --enable-encoder=libx264,aac \
            --enable-decoder=rawvideo,pcm_s16le \
            --enable-muxer=flv,mp4,matroska \
            --enable-demuxer=rawvideo \
            --enable-swscale --enable-swresample \
            --extra-cflags="-I$PREFIX/include" \
            --extra-ldflags="-L$PREFIX/lib" \
            --arch=x86_64 --target-os=mingw64
          make -j"$NUMBER_OF_PROCESSORS"
          make install

      # ----- Tar + zstd-compress the prefix -----

      - name: Package prefix as tar.zst (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          set -e
          # Drop a version manifest into the prefix so build.yml can sanity-
          # check that the downloaded tarball matches its expected version pin.
          {
            echo "FFMPEG_VERSION=${FFMPEG_VERSION}"
            echo "X264_REF=${X264_REF}"
            echo "TARGET=${{ matrix.name }}"
            echo "BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "BUILD_COMMIT=${{ github.sha }}"
          } > ffmpeg-static/prefix/PREBUILT_VERSION
          tar --use-compress-program='zstd -19 -T0' \
            -cf "ffmpeg-static-${{ matrix.name }}.tar.zst" \
            -C ffmpeg-static prefix
          ls -lh "ffmpeg-static-${{ matrix.name }}.tar.zst"

      - name: Package prefix as tar.zst (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -e
          {
            echo "FFMPEG_VERSION=${FFMPEG_VERSION}"
            echo "X264_REF=${X264_REF}"
            echo "TARGET=${{ matrix.name }}"
            echo "BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "BUILD_COMMIT=${{ github.sha }}"
          } > ffmpeg-static/prefix/PREBUILT_VERSION
          tar --use-compress-program='zstd -19 -T0' \
            -cf "ffmpeg-static-${{ matrix.name }}.tar.zst" \
            -C ffmpeg-static prefix
          ls -lh "ffmpeg-static-${{ matrix.name }}.tar.zst"

      # ----- Upload as inter-job artifact (the release job picks them up) -----

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-static-${{ matrix.name }}
          path: ffmpeg-static-${{ matrix.name }}.tar.zst
          if-no-files-found: error
          retention-days: 1

  # ----- Publish all four tarballs to a stable GitHub Release -----

  publish:
    needs: build-ffmpeg
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: ffmpeg-static-*
          merge-multiple: true

      - name: Inspect downloaded tarballs
        run: ls -la dist/

      - name: Compose release body
        id: body
        run: |
          {
            echo "Static FFmpeg + x264 prebuilt prefixes consumed by build.yml."
            echo
            echo "**FFmpeg version**: \`${FFMPEG_VERSION}\`"
            echo "**x264 ref**: \`${X264_REF}\`"
            echo "**Built at**: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "**Build commit**: \`${{ github.sha }}\`"
            echo
            echo "**Targets**: windows-amd64, linux-amd64, macos-arm64, macos-amd64"
            echo
            echo "Each \`.tar.zst\` contains a \`prefix/\` directory with"
            echo "\`lib/lib{avcodec,avformat,avutil,swscale,swresample,x264}.a\`,"
            echo "matching headers, and \`PREBUILT_VERSION\` metadata."
            echo
            echo "This is an internal build cache, not a user-facing release."
          } > body.md
          {
            echo 'body<<EOF'
            cat body.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ffmpeg-prebuilt
          name: 'FFmpeg static prebuilt (${{ env.FFMPEG_VERSION }})'
          body: ${{ steps.body.outputs.body }}
          prerelease: true
          files: dist/*.tar.zst
