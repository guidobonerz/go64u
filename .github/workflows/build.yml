name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Pin third-party deps so cache keys stay stable across runs.
  FFMPEG_VERSION: 'n7.1.1'
  X264_REF: 'stable'

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            runs-on: windows-latest
            output: go64u.exe
          - name: linux-amd64
            runs-on: ubuntu-latest
            output: go64u-linux-amd64
          - name: macos-arm64
            runs-on: macos-latest      # Apple Silicon
            output: go64u-darwin-arm64
          - name: macos-amd64
            runs-on: macos-13          # last Intel runner
            output: go64u-darwin-amd64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ----- Per-OS host deps -----
      # We still need these even when FFmpeg is static: nasm/yasm to build x264;
      # X11/Wayland/EGL/Vulkan headers for Gio's CGO; mingw for Windows.

      - name: Install host deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc make pkg-config nasm yasm \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcursor-dev libxfixes-dev \
            libgles2-mesa-dev libegl1-mesa-dev \
            libwayland-dev libvulkan-dev

      - name: Install host deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config nasm

      - name: Install host deps (Windows / MSYS2)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-make
            git
            patch
            diffutils

      # ----- Cache the FFmpeg+x264 static prefix -----
      # Path is identical across runners so the cache action handles it uniformly.
      # Windows path is workspace-relative; MSYS2 sees it via /d/a/... mapping.

      - name: Cache static FFmpeg+x264
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: ffmpeg-static/prefix
          key: ffmpeg-static-${{ matrix.name }}-ffmpeg${{ env.FFMPEG_VERSION }}-x264${{ env.X264_REF }}-v1

      # ----- Build x264 + FFmpeg statically (Unix) -----

      - name: Build static x264 + FFmpeg (Linux/macOS)
        if: runner.os != 'Windows' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          PREFIX="$PWD/ffmpeg-static/prefix"
          mkdir -p "$PREFIX"

          # ---- x264 ----
          git clone --depth 1 --branch "$X264_REF" \
            https://code.videolan.org/videolan/x264.git x264-src
          cd x264-src
          ./configure --prefix="$PREFIX" \
            --enable-static --disable-cli --disable-opencl
          if [ "$(uname)" = "Darwin" ]; then JOBS=$(sysctl -n hw.ncpu); else JOBS=$(nproc); fi
          make -j"$JOBS"
          make install
          cd ..

          # ---- FFmpeg ----
          git clone --depth 1 --branch "$FFMPEG_VERSION" \
            https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src

          EXTRA_CONFIG=""
          ENCODERS="libx264,aac"
          if [ "$(uname)" = "Darwin" ]; then
            EXTRA_CONFIG="--enable-videotoolbox"
            ENCODERS="libx264,h264_videotoolbox,aac"
          fi

          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" ./configure \
            --prefix="$PREFIX" \
            --enable-gpl --enable-libx264 $EXTRA_CONFIG \
            --enable-static --disable-shared \
            --disable-programs --disable-doc \
            --enable-protocol=file,pipe,tcp,rtmp \
            --enable-encoder=$ENCODERS \
            --enable-decoder=rawvideo,pcm_s16le \
            --enable-muxer=flv,mp4,matroska \
            --enable-demuxer=rawvideo \
            --enable-swscale --enable-swresample \
            --extra-cflags="-I$PREFIX/include" \
            --extra-ldflags="-L$PREFIX/lib"
          make -j"$JOBS"
          make install

      # ----- Build x264 + FFmpeg statically (Windows / MSYS2) -----

      - name: Build static x264 + FFmpeg (Windows / MSYS2)
        if: runner.os == 'Windows' && steps.ffmpeg-cache.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: |
          set -e
          export PATH="/mingw64/bin:$PATH"
          mkdir -p ffmpeg-static/prefix
          # Mixed-style path (D:/a/...) so both MSYS2 'install' and native
          # MinGW tools (gcc-ranlib etc.) can resolve it. Without this,
          # install lands the file but gcc-ranlib can't find it.
          PREFIX="$(cygpath -m "$(pwd)/ffmpeg-static/prefix")"

          # ---- x264 ----
          git clone --depth 1 --branch "$X264_REF" \
            https://code.videolan.org/videolan/x264.git x264-src
          cd x264-src
          ./configure --prefix="$PREFIX" \
            --enable-static --disable-cli --disable-opencl
          mingw32-make -j"$NUMBER_OF_PROCESSORS"
          mingw32-make install
          cd ..

          # ---- FFmpeg ----
          git clone --depth 1 --branch "$FFMPEG_VERSION" \
            https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" ./configure \
            --prefix="$PREFIX" \
            --enable-gpl --enable-libx264 \
            --enable-static --disable-shared \
            --disable-programs --disable-doc \
            --enable-protocol=file,pipe,tcp,rtmp \
            --enable-encoder=libx264,aac \
            --enable-decoder=rawvideo,pcm_s16le \
            --enable-muxer=flv,mp4,matroska \
            --enable-demuxer=rawvideo \
            --enable-swscale --enable-swresample \
            --extra-cflags="-I$PREFIX/include" \
            --extra-ldflags="-L$PREFIX/lib" \
            --arch=x86_64 --target-os=mingw64
          mingw32-make -j"$NUMBER_OF_PROCESSORS"
          mingw32-make install

      # ----- Go build with static FFmpeg -----

      - name: Go build (Linux)
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: '1'
        run: |
          set -e
          PREFIX="$PWD/ffmpeg-static/prefix"
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          PKG_FLAGS="$(pkg-config --static --libs libavcodec libavformat libavutil libswscale libswresample)"
          export CGO_LDFLAGS="$PKG_FLAGS -lm -lz -ldl -lpthread"
          go build -trimpath -ldflags '-w -s' -o ${{ matrix.output }} main.go

      - name: Go build (macOS)
        if: runner.os == 'macOS'
        env:
          CGO_ENABLED: '1'
        run: |
          set -e
          PREFIX="$PWD/ffmpeg-static/prefix"
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          PKG_FLAGS="$(pkg-config --static --libs libavcodec libavformat libavutil libswscale libswresample)"
          FRAMEWORKS="-framework VideoToolbox -framework CoreMedia -framework CoreVideo \
                      -framework CoreFoundation -framework AudioToolbox -framework Security \
                      -framework AVFoundation -framework CoreServices"
          export CGO_LDFLAGS="$PKG_FLAGS $FRAMEWORKS"
          # No -extldflags -static on macOS; libSystem must remain dynamic.
          go build -trimpath -ldflags '-w -s' -o ${{ matrix.output }} main.go

      - name: Go build (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CGO_ENABLED: '1'
        run: |
          set -e
          export PATH="/mingw64/bin:$PATH"
          # Match the mixed-style prefix used during the FFmpeg build so the
          # .pc files and CGO_LDFLAGS paths resolve through both MSYS2 and
          # native MinGW tools.
          PREFIX="$(cygpath -m "$(pwd)/ffmpeg-static/prefix")"
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          PKG_FLAGS="$(pkg-config --static --libs libavcodec libavformat libavutil libswscale libswresample)"
          # Windows system libs FFmpeg pulls in transitively.
          export CGO_LDFLAGS="$PKG_FLAGS -lws2_32 -lbcrypt -lole32 -lsecur32 -lstrmiids -luuid"
          # -extldflags '-static' here gives a fully static .exe (no MSYS2 DLL
          # dependency at runtime); -H=windowsgui suppresses the console window.
          go build -trimpath -ldflags "-H=windowsgui -w -s -extldflags '-static'" \
            -o ${{ matrix.output }} main.go

      # ----- macOS: ad-hoc codesign so the binary launches on Apple Silicon -----

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - ${{ matrix.output }}

      # ----- Sanity: verify FFmpeg/x264 are NOT dynamically linked -----

      - name: Verify static linkage (Linux)
        if: runner.os == 'Linux'
        run: |
          file ${{ matrix.output }}
          if ldd ${{ matrix.output }} | grep -E 'libav|libsw|libx264'; then
            echo "ERROR: ${{ matrix.output }} is dynamically linked against FFmpeg/x264." >&2
            exit 1
          fi
          echo "OK: no FFmpeg/x264 dylib references."

      - name: Verify static linkage (macOS)
        if: runner.os == 'macOS'
        run: |
          file ${{ matrix.output }}
          if otool -L ${{ matrix.output }} | grep -E 'libav|libsw|libx264'; then
            echo "ERROR: ${{ matrix.output }} is dynamically linked against FFmpeg/x264." >&2
            exit 1
          fi
          echo "OK: no FFmpeg/x264 dylib references."

      - name: Verify static linkage (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          file ${{ matrix.output }}
          if ldd ${{ matrix.output }} 2>&1 | grep -iE 'avcodec|swscale|x264'; then
            echo "ERROR: ${{ matrix.output }} is dynamically linked against FFmpeg/x264." >&2
            exit 1
          fi
          echo "OK: no FFmpeg/x264 DLL references."

      # ----- Upload as a workflow artifact -----

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.output }}
          if-no-files-found: error
          retention-days: 14

  # ----- Tag-driven release: collect all four artifacts and attach to a GitHub Release -----

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts into a single dir
        run: |
          mkdir -p out
          find dist -type f -exec cp {} out/ \;
          ls -la out/

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
