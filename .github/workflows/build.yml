name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Verhindert, dass ein Tag-Push, der gleichzeitig auf main landet, den Workflow
# zweimal startet. Gleichzeitig werden ältere Läufe auf demselben Ref abgebrochen,
# wenn ein neuer Push kommt — spart CI-Minuten bei schnellen Folge-Pushes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# IMPORTANT: FFMPEG_VERSION and X264_REF MUST stay identical to the values in
# .github/workflows/ffmpeg-prebuilt.yml. Mismatch means this workflow downloads
# a tarball that doesn't match what the Go build expects (the PREBUILT_VERSION
# sanity check below will catch it).
env:
  FFMPEG_VERSION: 'n8.0'
  X264_REF: 'b35605ace3ddf7c1a5d67a2eb553f034aef41d55'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            runs-on: windows-latest
            output: go64u.exe
          - name: linux-amd64
            runs-on: ubuntu-latest
            output: go64u-linux-amd64
          - name: macos-arm64
            runs-on: macos-latest      # Apple Silicon, native build
            output: go64u-darwin-arm64
            goarch: arm64
            clang_arch: arm64
            ff_arch: aarch64
          - name: macos-amd64
            runs-on: macos-latest      # Apple Silicon, cross-compile to x86_64
            output: go64u-darwin-amd64
            goarch: amd64
            clang_arch: x86_64
            ff_arch: x86_64

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      # ----- Windows: Defender-Ausschluss VOR jeder Kompilier-Aktivität -----
      # Defender scannt sonst jede der ~tausenden .o-Dateien beim Erstellen.
      # Workspace-Pfad und die typischen Toolchain-Prozesse ausschließen.
      # Muss vor setup-msys2 und vor dem FFmpeg-Build laufen, damit die
      # Exclusion auch greift, wenn der Cache miss'ed.

      - name: Defender exclusions (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "C:\msys64"
          Add-MpPreference -ExclusionProcess "gcc.exe"
          Add-MpPreference -ExclusionProcess "g++.exe"
          Add-MpPreference -ExclusionProcess "ld.exe"
          Add-MpPreference -ExclusionProcess "ar.exe"
          Add-MpPreference -ExclusionProcess "ranlib.exe"
          Add-MpPreference -ExclusionProcess "make.exe"
          Add-MpPreference -ExclusionProcess "mingw32-make.exe"
          Add-MpPreference -ExclusionProcess "nasm.exe"
          Add-MpPreference -ExclusionProcess "go.exe"
          Add-MpPreference -ExclusionProcess "link.exe"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ----- Per-OS host deps (only what the Go-build itself needs) -----
      # FFmpeg/x264 toolchain (nasm, make, patch, ...) is no longer needed
      # here — the prebuilt tarball ships ready-built .a archives. We do
      # still need: a C compiler for CGO, pkg-config to read the .pc files
      # from the tarball, zstd to extract it, and the Gio system libs on
      # Linux for the Gio CGO portion.

      - name: Install host deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc pkg-config zstd \
            libx11-dev libx11-xcb-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcursor-dev libxfixes-dev \
            libgles2-mesa-dev libegl1-mesa-dev \
            libwayland-dev libvulkan-dev \
            libasound2-dev

      - name: Install host deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config zstd

      - name: Install host deps (Windows / MSYS2)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # Inherit the Windows PATH so setup-go's go.exe is reachable from
          # within the msys2 shell. Default 'minimal' would hide it.
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-zstd
            tar
            git

      # ----- Pull the prebuilt FFmpeg+x264 static prefix from the
      #       'ffmpeg-prebuilt' GitHub Release (built by ffmpeg-prebuilt.yml).
      # If this step fails, the prebuilt release is missing or out of date —
      # run `gh workflow run ffmpeg-prebuilt.yml --ref main` and retry.

      - name: Download prebuilt FFmpeg static (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET: ffmpeg-static-${{ matrix.name }}.tar.zst
        run: |
          set -e
          if ! gh release download ffmpeg-prebuilt \
                --repo "${{ github.repository }}" \
                --pattern "$ASSET" --output "$ASSET"; then
            echo "::error::Prebuilt asset '$ASSET' not found in 'ffmpeg-prebuilt' release."
            echo "::error::Run: gh workflow run ffmpeg-prebuilt.yml --ref main"
            exit 1
          fi
          mkdir -p ffmpeg-static
          tar --use-compress-program=zstd -xf "$ASSET" -C ffmpeg-static
          rm "$ASSET"
          test -f ffmpeg-static/prefix/lib/libavcodec.a || {
            echo "::error::extracted tarball did not yield prefix/lib/libavcodec.a"
            exit 1
          }
          # Sanity-check the version pin matches what we expect.
          if [ -f ffmpeg-static/prefix/PREBUILT_VERSION ]; then
            cat ffmpeg-static/prefix/PREBUILT_VERSION
            grep -q "^FFMPEG_VERSION=${FFMPEG_VERSION}$" ffmpeg-static/prefix/PREBUILT_VERSION || {
              echo "::error::Prebuilt was built with a different FFMPEG_VERSION than this workflow expects."
              echo "::error::Re-run ffmpeg-prebuilt.yml after aligning both workflows."
              exit 1
            }
            grep -q "^X264_REF=${X264_REF}$" ffmpeg-static/prefix/PREBUILT_VERSION || {
              echo "::error::Prebuilt was built with a different X264_REF than this workflow expects."
              exit 1
            }
          fi

      - name: Download prebuilt FFmpeg static (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET: ffmpeg-static-${{ matrix.name }}.tar.zst
        run: |
          set -e
          export PATH="/mingw64/bin:$PATH"
          # gh.exe is on the runner's Windows PATH (path-type: inherit).
          if ! gh release download ffmpeg-prebuilt \
                --repo "${{ github.repository }}" \
                --pattern "$ASSET" --output "$ASSET"; then
            echo "::error::Prebuilt asset '$ASSET' not found in 'ffmpeg-prebuilt' release."
            echo "::error::Run: gh workflow run ffmpeg-prebuilt.yml --ref main"
            exit 1
          fi
          mkdir -p ffmpeg-static
          tar --use-compress-program=zstd -xf "$ASSET" -C ffmpeg-static
          rm "$ASSET"
          test -f ffmpeg-static/prefix/lib/libavcodec.a || {
            echo "::error::extracted tarball did not yield prefix/lib/libavcodec.a"
            exit 1
          }
          if [ -f ffmpeg-static/prefix/PREBUILT_VERSION ]; then
            cat ffmpeg-static/prefix/PREBUILT_VERSION
            grep -q "^FFMPEG_VERSION=${FFMPEG_VERSION}$" ffmpeg-static/prefix/PREBUILT_VERSION || {
              echo "::error::Prebuilt was built with a different FFMPEG_VERSION than this workflow expects."
              exit 1
            }
            grep -q "^X264_REF=${X264_REF}$" ffmpeg-static/prefix/PREBUILT_VERSION || {
              echo "::error::Prebuilt was built with a different X264_REF than this workflow expects."
              exit 1
            }
          fi

      # ----- Go build with static FFmpeg -----

      - name: Go build (Linux)
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: '1'
        run: |
          set -e
          PREFIX="$PWD/ffmpeg-static/prefix"
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          PKG_FLAGS="$(pkg-config --static --libs libavcodec libavformat libavutil libswscale libswresample)"
          export CGO_LDFLAGS="$PKG_FLAGS -lm -lz -ldl -lpthread"
          # Hinweis: kein `-extldflags '-static'` auf Linux — Gio braucht
          # X11/Wayland/EGL/Vulkan/ALSA als dynamische System-Libs. FFmpeg/x264
          # bleiben statisch (nur .a im PREFIX vorhanden), libc/pthread/X11
          # werden bewusst dynamisch gelinkt. Konsistenz mit Windows ist hier
          # nicht möglich, weil Windows keine vergleichbaren System-GUI-Libs
          # hat — dort kann der MinGW-Runtime statisch reingezogen werden.
          go build -trimpath -ldflags '-w -s' -o ${{ matrix.output }} main.go

      - name: Go build (macOS)
        if: runner.os == 'macOS'
        env:
          CGO_ENABLED: '1'
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          MATRIX_CLANG_ARCH: ${{ matrix.clang_arch }}
        run: |
          set -e
          PREFIX="$PWD/ffmpeg-static/prefix"
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          PKG_FLAGS="$(pkg-config --static --libs libavcodec libavformat libavutil libswscale libswresample)"
          FRAMEWORKS="-framework VideoToolbox -framework CoreMedia -framework CoreVideo \
                      -framework CoreFoundation -framework AudioToolbox -framework Security \
                      -framework AVFoundation -framework CoreServices"
          export CGO_CFLAGS="-arch ${MATRIX_CLANG_ARCH}"
          export CGO_LDFLAGS="$PKG_FLAGS $FRAMEWORKS -arch ${MATRIX_CLANG_ARCH}"
          # No -extldflags -static on macOS; libSystem must remain dynamic.
          go build -trimpath -ldflags '-w -s' -o ${{ matrix.output }} main.go

      - name: Go build (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CGO_ENABLED: '1'
        run: |
          set -e
          export PATH="/mingw64/bin:$PATH"
          # Match the mixed-style prefix used during the FFmpeg build so the
          # .pc files and CGO_LDFLAGS paths resolve through both MSYS2 and
          # native MinGW tools.
          PREFIX="$(cygpath -m "$(pwd)/ffmpeg-static/prefix")"
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          PKG_FLAGS="$(pkg-config --static --libs libavcodec libavformat libavutil libswscale libswresample)"
          # Windows system libs FFmpeg pulls in transitively.
          export CGO_LDFLAGS="$PKG_FLAGS -lws2_32 -lbcrypt -lole32 -lsecur32 -lstrmiids -luuid"
          # -extldflags '-static' here gives a fully static .exe (no MSYS2 DLL
          # dependency at runtime). NB: deliberately NOT '-H=windowsgui' —
          # that would make the binary a GUI subsystem app with no stdout,
          # breaking CLI modes like 'go64u --terminal' and cobra subcommands.
          # Trade-off: a brief console window flashes when double-clicked
          # in Explorer; that's acceptable for a hybrid GUI/CLI tool.
          go build -trimpath -ldflags "-w -s -extldflags '-static'" \
            -o ${{ matrix.output }} main.go

      # ----- macOS: ad-hoc codesign so the binary launches on Apple Silicon -----

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - ${{ matrix.output }}

      # ----- Sanity: verify FFmpeg/x264 are NOT dynamically linked -----

      - name: Verify static linkage (Linux)
        if: runner.os == 'Linux'
        run: |
          file ${{ matrix.output }}
          if ldd ${{ matrix.output }} | grep -E 'libav|libsw|libx264'; then
            echo "ERROR: ${{ matrix.output }} is dynamically linked against FFmpeg/x264." >&2
            exit 1
          fi
          echo "OK: no FFmpeg/x264 dylib references."

      - name: Verify static linkage (macOS)
        if: runner.os == 'macOS'
        run: |
          file ${{ matrix.output }}
          otool -L ${{ matrix.output }}
          if otool -L ${{ matrix.output }} | grep -E 'libav|libsw|libx264'; then
            echo "ERROR: ${{ matrix.output }} is dynamically linked against FFmpeg/x264." >&2
            exit 1
          fi
          # Catch any Homebrew dylib leaking into the binary (e.g. libX11.6
          # via FFmpeg autodetecting brew's libx11). End users won't have
          # /opt/homebrew/, the binary would refuse to launch.
          if otool -L ${{ matrix.output }} | grep -E '/opt/homebrew/|/usr/local/'; then
            echo "ERROR: ${{ matrix.output }} references a Homebrew dylib path that won't exist on most user machines." >&2
            exit 1
          fi
          echo "OK: no FFmpeg/x264 or Homebrew dylib references."

      - name: Verify static linkage (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          file ${{ matrix.output }}
          LDD_OUT="$(ldd ${{ matrix.output }} 2>&1 || true)"
          echo "$LDD_OUT"
          # 1) FFmpeg/x264 dürfen nicht dynamisch gelinkt sein.
          if echo "$LDD_OUT" | grep -iE 'avcodec|avformat|avutil|swscale|swresample|x264'; then
            echo "ERROR: ${{ matrix.output }} is dynamically linked against FFmpeg/x264." >&2
            exit 1
          fi
          # 2) MinGW-Runtime darf nicht dynamisch gelinkt sein — sonst braucht
          #    der User MSYS2-DLLs zur Laufzeit. Das verifiziert, dass
          #    `-extldflags '-static'` wirklich gegriffen hat.
          if echo "$LDD_OUT" | grep -iE 'libgcc_s|libwinpthread|libstdc\+\+'; then
            echo "ERROR: ${{ matrix.output }} pulls in MinGW runtime DLLs." >&2
            exit 1
          fi
          echo "OK: no FFmpeg/x264 or MinGW runtime DLL references."

      # ----- Upload as a workflow artifact -----

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.output }}
          if-no-files-found: error
          retention-days: 14

  # ----- Tag-driven release: collect all four artifacts and attach to a GitHub Release -----

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package each platform binary into a zip
        run: |
          set -e
          mkdir -p out
          # actions/upload-artifact strips the +x bit — restore it on the
          # Unix binaries so they're directly runnable after unzipping.
          for dir in dist/*/; do
            name="$(basename "$dir")"
            for f in "$dir"*; do
              case "$name" in
                windows-*) ;;     # .exe doesn't need +x
                *) chmod +x "$f" ;;
              esac
              # -j: store filename only (drop the dist/<name>/ path prefix)
              zip -j "out/go64u-${name}.zip" "$f"
            done
          done
          ls -la out/

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*.zip
          generate_release_notes: true